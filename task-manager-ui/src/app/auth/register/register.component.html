<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <span class="brand-logo">🗂</span>
      <h2>Get Started</h2>
      <p class="subtitle">Create your personal TaskFlow workspace</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="alert alert-danger" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          formControlName="username" 
          placeholder="john_doe" 
          class="form-control"
          [class.is-invalid]="form.get('username')?.touched && form.get('username')?.invalid"
        />
        <div class="invalid-feedback" *ngIf="form.get('username')?.touched && form.get('username')?.invalid">
          <span *ngIf="form.get('username')?.errors?.['required']">Username is required.</span>
          <span *ngIf="form.get('username')?.errors?.['minlength']">Username must be at least 3 characters.</span>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          placeholder="yourname@example.com" 
          class="form-control"
          [class.is-invalid]="form.get('email')?.touched && form.get('email')?.invalid"
        />
        <div class="invalid-feedback" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
          <span *ngIf="form.get('email')?.errors?.['required']">Email is required.</span>
          <span *ngIf="form.get('email')?.errors?.['email']">Please enter a valid email.</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          placeholder="••••••••" 
          class="form-control"
          [class.is-invalid]="form.get('password')?.touched && form.get('password')?.invalid"
        />
        <div class="invalid-feedback" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
          <span *ngIf="form.get('password')?.errors?.['required']">Password is required.</span>
          <span *ngIf="form.get('password')?.errors?.['minlength']">Password must be at least 6 characters.</span>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
        {{ loading ? 'Creating Account...' : 'Sign Up' }}
      </button>
    </form>

    <div class="auth-footer">
      <span>Already have an account?</span>
      <a routerLink="/auth/login">Log In</a>
    </div>
  </div>
</div>
